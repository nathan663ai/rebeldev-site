<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Portal | Rebel Dev</title>
<meta name="description" content="Customer portal for Rebel Dev clients. Sign in to access your projects, invoices, and support." />
<meta name="theme-color" content="#0a0a0a" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:            #0a0a0a;
  --bg-elev:       #111111;
  --bg-card:       #141414;
  --border:        #1f1f1f;
  --border-strong: #2a2a2a;
  --border-accent: rgba(240,192,0,0.28);
  --text:          #f5f5f5;
  --text-dim:      #a3a3a3;
  --text-muted:    #666;
  --accent:        #f0c000;
  --accent-dim:    rgba(240,192,0,0.08);
  --accent-glow:   rgba(240,192,0,0.15);
  --font-sans:     'Outfit', ui-sans-serif, system-ui, sans-serif;
  --font-mono:     'JetBrains Mono', ui-monospace, Menlo, monospace;
  --ease:          cubic-bezier(0.22, 1, 0.36, 1);
}
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  font-weight: 300;
  line-height: 1.55;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; color: inherit; }

/* Grain */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.018;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* Ambient glow */
body::after {
  content: "";
  position: fixed;
  top: -20%; left: 50%;
  transform: translateX(-50%);
  width: 800px; height: 800px;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
  filter: blur(100px);
  pointer-events: none;
  z-index: 0;
}

/* Grid bg */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
  opacity: 0.3;
  z-index: 0;
  pointer-events: none;
}

/* Header */
.portal-header {
  position: relative;
  z-index: 10;
  padding: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1240px;
  margin: 0 auto;
  width: 100%;
}
.logo {
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 6px;
}
.logo-icon {
  height: 1.8em;
  width: auto;
  display: block;
  margin: -0.4em 0;
}
.logo-accent { color: var(--accent); }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  transition: color 0.2s var(--ease);
}
.back-link:hover { color: var(--accent); }
.back-link svg { width: 14px; height: 14px; }

/* Main area */
.portal-main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 80px;
  position: relative;
  z-index: 5;
}

.login-wrap {
  width: 100%;
  max-width: 460px;
  animation: fadeUp 0.7s var(--ease) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-label {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.login-label::before {
  content: "";
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 2px;
  box-shadow: 0 0 12px var(--accent);
}

.login-wrap h1 {
  font-size: 36px;
  font-weight: 900;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-bottom: 12px;
}
.login-wrap > p {
  color: var(--text-dim);
  font-size: 16px;
  margin-bottom: 36px;
  line-height: 1.55;
}

.login-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 36px;
  position: relative;
  overflow: hidden;
}
.login-card::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.field input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-elev);
  border: 1px solid var(--border-strong);
  border-radius: 8px;
  color: var(--text);
  font-size: 15px;
  font-weight: 400;
  transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
}
.field input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
}
.btn {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  color: #000;
  font-weight: 500;
  font-size: 15px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 10px 30px var(--accent-glow);
}
.btn svg { width: 16px; height: 16px; }

.bottom-note {
  margin-top: 28px;
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
}
.bottom-note a { color: var(--accent); }

/* Footer */
.portal-footer {
  position: relative;
  z-index: 5;
  padding: 24px;
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-align: center;
}
.portal-footer a { color: var(--text-muted); transition: color 0.2s var(--ease); }
.portal-footer a:hover { color: var(--accent); }

@media (max-width: 560px) {
  .login-card { padding: 28px 22px; }
  .login-wrap h1 { font-size: 28px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<header class="portal-header">
  <a href="index.html" class="logo">
    <img src="logo-icon1.png" alt="Rebel Dev" class="logo-icon" />
    REBEL <span class="logo-accent">DEV</span>
  </a>
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to site
  </a>
</header>

<main class="portal-main">
  <div class="login-wrap">
    <div class="login-label">Customer Portal</div>
    <h1>Welcome back.</h1>
    <p>Sign in to access your projects, invoices, and support tickets.</p>

    <div class="login-card">
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn">
          Sign in
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>

    <div class="bottom-note">
      Not a client yet? <a href="index.html#contact">Request a discovery call &rarr;</a>
    </div>
  </div>
</main>

<footer class="portal-footer">
  &copy; 2026 Rebel AI Ltd &nbsp;/&nbsp; Rebel Dev is a trading name of Rebel AI Ltd &nbsp;/&nbsp; <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  // Portal is not yet wired up
  alert('Portal is launching soon. Please contact contact@rebeldev.co.uk for access.');
});
</script>

</body>
</html>
