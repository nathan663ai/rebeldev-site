<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:        #0a0a0a;
  --ink-2:      #0e0e0c;
  --panel:      #151411;
  --panel-2:    #1b1a16;
  --line:       #201f1b;
  --line-2:     #2b2a24;
  --amber:      #f0c000;
  --amber-deep: #b8860b;
  --amber-dim:  rgba(240,192,0,0.08);
  --amber-glow: rgba(240,192,0,0.16);
  --text:       #f4f2ec;
  --text-dim:   #a7a399;
  --text-mute:  #6a665c;
  --green:      #3fb950;
  --font-sans:  'Outfit', ui-sans-serif, system-ui, sans-serif;
  --font-mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;
  --ease:       cubic-bezier(0.22, 1, 0.36, 1);
  --gutter:     clamp(20px, 5vw, 64px);
}
html { -webkit-text-size-adjust: 100%; overflow-x: hidden; width: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--ink);
  color: var(--text);
  font-weight: 300;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  width: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; color: inherit; }
::selection { background: var(--amber); color: #000; }

/* Persistent engineering grid */
.surface-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 72px 72px;
  opacity: 0.5;
  mask-image: radial-gradient(ellipse 120% 90% at 50% 20%, #000 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 120% 90% at 50% 20%, #000 20%, transparent 70%);
}
.surface-grain {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.03; mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}
.glow {
  position: fixed; top: -18%; left: 50%; transform: translateX(-50%);
  width: 760px; height: 760px; z-index: 0; pointer-events: none;
  background: radial-gradient(circle, var(--amber-glow) 0%, transparent 62%);
  filter: blur(90px); opacity: 0.6;
}

/* Header */
.portal-header {
  position: relative; z-index: 10; padding: 22px var(--gutter);
  display: flex; justify-content: space-between; align-items: center;
  max-width: 1240px; margin: 0 auto; width: 100%;
}
.logo { font-weight: 900; font-size: 1.4rem; line-height: 1; letter-spacing: -0.02em; display: inline-flex; align-items: center; gap: 8px; }
.logo-icon { height: 1.75em; width: auto; margin: -0.4em 0; }
.logo-accent { color: var(--amber); }
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 0.78rem; letter-spacing: 0.03em;
  color: var(--text-dim); transition: color 0.2s var(--ease);
}
.back-link:hover { color: var(--amber); }
.back-link svg { width: 14px; height: 14px; }

/* Main */
.portal-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px var(--gutter) 80px; position: relative; z-index: 5; }
.login-wrap { width: 100%; max-width: 460px; animation: fadeUp 0.7s var(--ease) both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

.login-label {
  font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--amber); display: inline-flex; align-items: center; gap: 12px; margin-bottom: 20px;
}
.login-label::before { content: ""; width: 22px; height: 1px; background: var(--amber); opacity: 0.7; }
.login-wrap h1 { font-size: 2.4rem; font-weight: 900; line-height: 1.0; letter-spacing: -0.035em; margin-bottom: 12px; }
.login-wrap > p { color: var(--text-dim); font-size: 1.02rem; margin-bottom: 34px; line-height: 1.55; font-weight: 300; }

.login-card {
  background: var(--ink-2); border: 1px solid var(--line-2); border-radius: 16px;
  padding: 34px; position: relative; overflow: hidden;
}
.login-card::before {
  content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--amber), transparent); opacity: 0.5;
}
.field { margin-bottom: 18px; }
.field label {
  display: block; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-mute); margin-bottom: 8px;
}
.field input {
  width: 100%; padding: 13px 15px; background: var(--ink); border: 1px solid var(--line-2);
  border-radius: 8px; color: var(--text); font-size: 0.98rem; font-weight: 300;
  transition: border-color 0.2s var(--ease), background 0.2s var(--ease);
}
.field input::placeholder { color: var(--text-mute); }
.field input:focus { outline: none; border-color: var(--amber); background: var(--ink-2); }
.btn {
  width: 100%; padding: 15px; background: var(--amber); color: #000; font-weight: 600;
  font-family: var(--font-mono); font-size: 0.9rem; border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px var(--amber-glow); }
.btn svg { width: 16px; height: 16px; }
.bottom-note { margin-top: 26px; font-size: 0.92rem; color: var(--text-dim); text-align: center; }
.bottom-note a { color: var(--amber); }

/* Footer */
.portal-footer {
  position: relative; z-index: 5; padding: 24px var(--gutter);
  border-top: 1px solid var(--line); font-family: var(--font-mono); font-size: 0.72rem;
  color: var(--text-mute); letter-spacing: 0.03em; text-align: center;
}
.portal-footer a { color: var(--text-mute); transition: color 0.2s var(--ease); }
.portal-footer a:hover { color: var(--amber); }
.portal-footer .footer-social { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; vertical-align: -4px; margin-left: 4px; color: var(--text-mute); }
.portal-footer .footer-social svg { width: 100%; height: 100%; display: block; }

@keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

@media (max-width: 560px) { .login-card { padding: 26px 22px; } .login-wrap h1 { font-size: 2rem; } }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; } }
</style>
</head>
<body>

<div class="surface-grid"></div>
<div class="surface-grain"></div>
<div class="glow"></div>

<header class="portal-header">
  <a href="index.html" class="logo">
    <img src="logo-icon1.webp" alt="Rebel Dev" class="logo-icon" width="200" height="134" fetchpriority="high" />
    REBEL <span class="logo-accent">DEV</span>
  </a>
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to site
  </a>
</header>

<main class="portal-main">
  <div class="login-wrap">
    <div class="login-label">Customer Portal</div>
    <h1>Welcome back.</h1>
    <p>Sign in to access your projects, invoices, and support tickets.</p>

    <div class="login-card">
      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn">
          Sign in
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>

    <div class="bottom-note">
      Not a client yet? <a href="index.html#contact">Request a discovery call &rarr;</a>
    </div>
  </div>
</main>

<footer class="portal-footer">
  &copy; 2026 Rebel AI Ltd &nbsp;/&nbsp; Rebel Dev is a trading name of Rebel AI Ltd &nbsp;/&nbsp; <a href="privacy.html">Privacy Policy</a> &nbsp;/&nbsp; <a href="https://www.linkedin.com/company/rebeldev-uk" target="_blank" rel="noopener noreferrer" aria-label="Rebel Dev on LinkedIn" class="footer-social">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.02-3.04-1.85-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.36V9h3.41v1.56h.05c.47-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.55C0 23.23.79 24 1.77 24h20.45C23.21 24 24 23.23 24 22.27V1.72C24 .77 23.21 0 22.22 0z"/></svg>
  </a>
</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  // Portal is not yet wired up
  alert('Portal is launching soon. Please contact contact@rebeldev.co.uk for access.');
});
</script>

</body>
